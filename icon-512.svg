<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#060612"/>
  <!-- Red envelope body -->
  <rect x="116" y="86" width="280" height="340" rx="16" fill="#dc2626"/>
  <!-- Envelope flap -->
  <path d="M116 86 L256 196 L396 86" fill="#b91c1c" stroke="#991b1b" stroke-width="2"/>
  <!-- Gold seal circle -->
  <circle cx="256" cy="256" r="64" fill="#fbbf24" opacity="0.9"/>
  <!-- Fortune character -->
  <text x="256" y="276" text-anchor="middle" font-size="76" font-weight="bold" fill="#dc2626" font-family="serif">福</text>
  <!-- Gold border decoration -->
  <rect x="132" y="102" width="248" height="308" rx="8" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.5"/>
  <!-- Inner decorative border -->
  <rect x="148" y="118" width="216" height="276" rx="4" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
  <!-- String -->
  <line x1="256" y1="24" x2="256" y2="86" stroke="#fbbf24" stroke-width="4"/>
  <circle cx="256" cy="20" r="6" fill="#fbbf24"/>
  <!-- Tassel left -->
  <line x1="196" y1="426" x2="188" y2="472" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="196" y1="426" x2="196" y2="476" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="196" y1="426" x2="204" y2="472" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <!-- Tassel right -->
  <line x1="316" y1="426" x2="308" y2="472" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="316" y1="426" x2="316" y2="476" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="316" y1="426" x2="324" y2="472" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <!-- Corner decorations -->
  <circle cx="148" cy="118" r="4" fill="#fbbf24" opacity="0.6"/>
  <circle cx="364" cy="118" r="4" fill="#fbbf24" opacity="0.6"/>
  <circle cx="148" cy="394" r="4" fill="#fbbf24" opacity="0.6"/>
  <circle cx="364" cy="394" r="4" fill="#fbbf24" opacity="0.6"/>
</svg>
