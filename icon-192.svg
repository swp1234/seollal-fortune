<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="32" fill="#060612"/>
  <!-- Red envelope body -->
  <rect x="46" y="36" width="100" height="120" rx="8" fill="#dc2626"/>
  <!-- Envelope flap -->
  <path d="M46 36 L96 76 L146 36" fill="#b91c1c" stroke="#991b1b" stroke-width="1"/>
  <!-- Gold seal circle -->
  <circle cx="96" cy="96" r="24" fill="#fbbf24" opacity="0.9"/>
  <!-- Fortune character -->
  <text x="96" y="103" text-anchor="middle" font-size="28" font-weight="bold" fill="#dc2626" font-family="serif">福</text>
  <!-- Gold border decoration -->
  <rect x="52" y="42" width="88" height="108" rx="4" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
  <!-- String -->
  <line x1="96" y1="12" x2="96" y2="36" stroke="#fbbf24" stroke-width="2"/>
  <!-- Tassel left -->
  <line x1="76" y1="156" x2="72" y2="176" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="156" x2="76" y2="178" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="156" x2="80" y2="176" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel right -->
  <line x1="116" y1="156" x2="112" y2="176" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="116" y1="156" x2="116" y2="178" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="116" y1="156" x2="120" y2="176" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
</svg>
